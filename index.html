<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Piece Time Transmuter (Ace Edition)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Ace's Flame Colors */
            --primary-color: #f1c40f; 
            --primary-glow: #f39c12;
            --accent-color: #e74c3c; 
            --accent-glow: #c0392b;
            
            --bg-overlay: rgba(15, 23, 42, 0.65); 
            --card-bg-glass: rgba(20, 20, 25, 0.2); 
            --text-main: #ecf0f1;
            --text-label: #bdc3c7;
            --font-main: 'Inter', sans-serif;
            --font-title: 'Cinzel', serif; 
        }

        body {
            font-family: var(--font-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('https://github.com/davidgeta/YA-YA-MOD/raw/refs/heads/main/44125720-8448-4e38-8f28-1de228526c39.jpeg') no-repeat center center fixed;
            background-size: cover;
        }

        @keyframes fadeInSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* နေရာကွက်ကြား မီးတောက်မယ့် Animation များ */
        @keyframes fire-flare-1 {
            0% { opacity: 0; filter: blur(8px); transform: scale(0.98); }
            30% { opacity: 1; filter: blur(12px); transform: scale(1.02); }
            60% { opacity: 0.2; filter: blur(10px); transform: scale(1); }
            100% { opacity: 0; filter: blur(8px); transform: scale(0.98); }
        }

        @keyframes fire-flare-2 {
            0% { opacity: 0.8; filter: blur(10px); transform: scale(1.01); }
            40% { opacity: 0; filter: blur(6px); transform: scale(0.99); }
            70% { opacity: 0.9; filter: blur(14px); transform: scale(1.03); }
            100% { opacity: 0.2; filter: blur(10px); transform: scale(1); }
        }

        .container {
            background-color: var(--card-bg-glass);
            backdrop-filter: blur(0.6px);
            -webkit-backdrop-filter: blur(0.6px);
            
            /* Box ရဲ့ ပုံမှန်ဘောင်ကို မှိန်ထားပါမယ် */
            border: 1px solid rgba(255, 100, 0, 0.1);
            
            padding: 3rem 2.5rem;
            border-radius: 20px;
            width: 100%;
            max-width: 550px;
            position: relative;
            margin: auto; 
            z-index: 1; /* အနောက်က မီးတောက်တွေ Box အပေါ်မရောက်လာအောင် */
            animation: fadeInSlideUp 0.6s ease-out forwards;
        }

        /* Box အနောက်ကနေ နေရာကွက်ကြား လင်းမယ့် မီးတောက် (အပိုင်း ၁) */
        .container::before {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 25px;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 0%, rgba(255, 69, 0, 0.8) 0%, transparent 35%),
                radial-gradient(circle at 90% 100%, rgba(255, 165, 0, 0.7) 0%, transparent 40%),
                radial-gradient(circle at 100% 40%, rgba(255, 0, 0, 0.6) 0%, transparent 30%);
            animation: fire-flare-1 4s infinite alternate ease-in-out;
            pointer-events: none;
        }

        /* Box အနောက်ကနေ နေရာကွက်ကြား လင်းမယ့် မီးတောက် (အပိုင်း ၂) */
        .container::after {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 25px;
            z-index: -1;
            background: 
                radial-gradient(circle at 80% 0%, rgba(255, 140, 0, 0.9) 0%, transparent 40%),
                radial-gradient(circle at 10% 100%, rgba(255, 69, 0, 0.8) 0%, transparent 35%),
                radial-gradient(circle at 0% 50%, rgba(243, 156, 18, 0.7) 0%, transparent 30%);
            animation: fire-flare-2 5s infinite alternate-reverse ease-in-out;
            pointer-events: none;
        }

        /* Thematic Title */
        h2 {
            font-family: var(--font-title);
            text-align: center;
            margin-top: 0;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--primary-glow), 0 0 15px var(--accent-glow);
            font-size: 2rem;
            line-height: 1.2;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-label);
            font-size: 0.875rem;
            margin-bottom: 2.5rem;
            letter-spacing: 0.5px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
        }

        .input-group:hover { transform: translateY(-3px); }

        .input-group.full-width { grid-column: span 2; }

        label {
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-label);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        label i {
            color: #ff9800; 
            text-shadow: 0 0 5px var(--primary-glow);
        }

        input {
            width: 100%;
            padding: 1rem 1.25rem;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-size: 1rem;
            font-family: var(--font-main);
            box-sizing: border-box;
            background-color: rgba(0, 0, 0, 0.3);
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        input:hover {
            background-color: rgba(255, 100, 0, 0.1);
            border-bottom-color: var(--primary-glow);
        }

        input:focus {
            outline: none;
            background-color: rgba(255, 100, 0, 0.15);
            border-bottom-color: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-glow);
            color: #fff;
        }

        .hex-input {
            font-family: monospace;
            font-weight: 600;
            color: #fff;
            letter-spacing: 1px;
            background-color: rgba(231, 76, 60, 0.15); 
        }

        .hex-input:focus {
            border-bottom-color: #fff;
            box-shadow: 0 0 20px #fff, 0 0 35px var(--accent-glow);
        }
        
        hr {
            border: none;
            border-top: 2px solid rgba(255, 100, 0, 0.2);
            margin: 2rem 0;
            grid-column: span 2;
            opacity: 0.6;
            position: relative;
        }

        hr::after {
            content: "🔥"; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: transparent;
            padding: 0 10px;
            font-size: 1.5rem;
            text-shadow: 0 0 10px var(--primary-glow);
        }
        
        @media (max-width: 480px) {
            .container { padding: 2rem 1.5rem; }
            .grid-layout { grid-template-columns: 1fr; gap: 1.25rem; }
            .input-group.full-width { grid-column: span 1; }
            hr { grid-column: span 1; margin: 1.5rem 0; }
            h2 { font-size: 1.5rem; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <h2><i class="fas fa-fire"></i> Ace's Flame <br> <i class="fas fa-history"></i> Transmuter</h2>
        <p class="subtitle">Convert numeric bounties through the legendary cipher!</p>

        <div class="grid-layout">
            <div class="input-group">
                <label for="inp-day"><i class="fas fa-calendar-day"></i> Days</label>
                <input type="number" id="inp-day" placeholder="0">
            </div>

            <div class="input-group">
                <label for="inp-hour"><i class="fas fa-clock"></i> Hours</label>
                <input type="number" id="inp-hour" placeholder="0">
            </div>

            <div class="input-group">
                <label for="inp-minute"><i class="fas fa-stopwatch"></i> Minutes</label>
                <input type="number" id="inp-minute" placeholder="0">
            </div>

            <div class="input-group">
                <label for="inp-second"><i class="fas fa-hourglass-half"></i> Seconds</label>
                <input type="number" id="inp-second" placeholder="0">
            </div>

            <div class="input-group full-width">
                <label for="inp-ms"><i class="fas fa-bolt"></i> Milliseconds (Bounty in Bellies)</label>
                <input type="number" id="inp-ms" placeholder="0">
            </div>

            <hr>

            <div class="input-group full-width">
                <label for="inp-hex"><i class="fas fa-scroll"></i> Ancient Cipher (Hex from Ms)</label>
                <input type="text" id="inp-hex" class="hex-input" placeholder="e.g. 36EE80">
            </div>
        </div>
    </div>

    <script>
        const els = {
            day: document.getElementById('inp-day'),
            hour: document.getElementById('inp-hour'),
            minute: document.getElementById('inp-minute'),
            second: document.getElementById('inp-second'),
            ms: document.getElementById('inp-ms'),
            hex: document.getElementById('inp-hex')
        };

        const multipliers = {
            day: 86400000,
            hour: 3600000,
            minute: 60000,
            second: 1000,
            ms: 1
        };

        function updateFromBase(baseMs, sourceId) {
            if (sourceId !== 'day') els.day.value = formatNumber(baseMs / multipliers.day);
            if (sourceId !== 'hour') els.hour.value = formatNumber(baseMs / multipliers.hour);
            if (sourceId !== 'minute') els.minute.value = formatNumber(baseMs / multipliers.minute);
            if (sourceId !== 'second') els.second.value = formatNumber(baseMs / multipliers.second);
            if (sourceId !== 'ms') els.ms.value = formatNumber(baseMs);
            
            if (sourceId !== 'hex') {
                if (baseMs >= 0) {
                    els.hex.value = Math.floor(baseMs).toString(16).toUpperCase();
                } else {
                    els.hex.value = "";
                }
            }
        }

        function formatNumber(num) {
            return Number.isInteger(num) ? num : parseFloat(num.toFixed(6));
        }

        function handleInput(e) {
            const id = e.target.id.replace('inp-', '');
            let val = e.target.value;
            
            if (val === '') {
                Object.values(els).forEach(el => el.value = '');
                return;
            }

            let baseMs = 0;

            if (id === 'hex') {
                baseMs = parseInt(val, 16);
                if (isNaN(baseMs)) return; 
            } else {
                baseMs = parseFloat(val) * multipliers[id];
            }
            
            updateFromBase(baseMs, id);
        }

        Object.values(els).forEach(el => {
            el.addEventListener('input', handleInput);
        });
    </script>

</body>
</html>
