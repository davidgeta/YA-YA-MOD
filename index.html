<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace's Flame Transmuter (Flicker Borders)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Ace's Flame Colors */
            --primary-color: #f1c40f; 
            --primary-glow: #f39c12;
            --accent-color: #e74c3c; 
            --accent-glow: #c0392b;
            /* Deeper fire colors for limited dots */
            --fire-core: #fff7e0;
            --fire-inner: #ffc400;
            --fire-outer: #ff5722;
            --fire-far: #bf360c;
            
            --bg-overlay: rgba(15, 23, 42, 0.65); /* Darker glass overlay */
            --card-bg-glass: rgba(20, 20, 25, 0.4); /* Warmer, darker glass background */
            --text-main: #ecf0f1;
            --text-label: #bdc3c7;
            --font-main: 'Inter', sans-serif;
            --font-title: 'Cinzel', serif; 
        }

        body {
            font-family: var(--font-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('https://github.com/davidgeta/YA-YA-MOD/raw/refs/heads/main/44125720-8448-4e38-8f28-1de228526c39.jpeg') no-repeat center center fixed;
            background-size: cover;
        }

        @keyframes fadeInSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* နေရာကွက်ကြား flickering မီးတောက်အစက်ငယ်များအတွက် Keyframes */
        @keyframes fire-dot-flicker {
            0%, 100% {
                opacity: 0;
                transform: scale(1);
                box-shadow: 0 0 5px rgba(255, 69, 0, 0);
            }
            30%, 70% {
                opacity: 1;
                transform: scale(1.1);
                box-shadow: 0 0 15px rgba(255, 69, 0, 0.6), 0 0 10px var(--primary-glow);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.05);
                box-shadow: 0 0 12px rgba(255, 69, 0, 0.5);
            }
        }

        .container {
            background-color: var(--card-bg-glass);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            
            /* Box ရဲ့ ပုံမှန်ဘောင်ကို မှိန်ထားပါမယ် */
            border: 1px solid rgba(255, 165, 0, 0.1);
            
            padding: 3rem 2.5rem;
            border-radius: 20px;
            width: 100%;
            max-width: 550px;
            position: relative;
            margin: auto; 
            
            /* Performance အတွက် z-index ကို manage လုပ်ပါတယ် */
            z-index: 1;
            animation: fadeInSlideUp 0.6s ease-out forwards;
            
            /* input groups များအတွက် relative position */
            overflow: visible;
        }

        /* Box edges များပေါ်တွင် randomly placed dots များနှင့် flicker animation */
        .container::before, .container::after,
        .input-group::before, .input-group::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            z-index: -1;
            background: radial-gradient(circle, var(--fire-core) 0%, var(--fire-inner) 40%, var(--fire-outer) 70%, transparent 100%);
            animation: fire-dot-flicker infinite ease-in-out;
            pointer-events: none;
        }

        /* Dots placement and animation duration/delay (8 dots total) */
        /* Dot 1 (Top Left) */
        .container::before {
            width: 10px; height: 10px;
            top: 2%; left: 2%;
            animation-duration: 2.2s;
            animation-delay: 0.1s;
        }
        /* Dot 2 (Top Right) */
        .container::after {
            width: 8px; height: 8px;
            top: 2%; right: 2%;
            animation-duration: 2.7s;
            animation-delay: 0.8s;
        }
        /* Dot 3 (Bottom Left) */
        .grid-layout::before {
            content: '';
            position: absolute;
            width: 12px; height: 12px;
            bottom: 2%; left: 2%;
            background: radial-gradient(circle, var(--fire-core) 0%, var(--fire-inner) 40%, var(--fire-outer) 70%, transparent 100%);
            border-radius: 50%;
            animation: fire-dot-flicker 2s infinite alternate ease-in-out;
            animation-delay: 1.5s;
        }
        /* Dot 4 (Bottom Right) */
        .grid-layout::after {
            content: '';
            position: absolute;
            width: 9px; height: 9px;
            bottom: 2%; right: 2%;
            background: radial-gradient(circle, var(--fire-core) 0%, var(--fire-inner) 40%, var(--fire-outer) 70%, transparent 100%);
            border-radius: 50%;
            animation: fire-dot-flicker 2.5s infinite alternate-reverse ease-in-out;
            animation-delay: 0.5s;
        }
        /* Dot 5 (Side) */
        .input-group:nth-child(1)::before {
            width: 7px; height: 7px;
            top: 40%; left: -10px;
            animation-duration: 1.8s;
            animation-delay: 1.2s;
        }
        /* Dot 6 (Side) */
        .input-group:nth-child(2)::before {
            width: 11px; height: 11px;
            top: 60%; right: -15px;
            animation-duration: 3s;
            animation-delay: 0.3s;
        }
        /* Dot 7 (Side) */
        .input-group:nth-child(3)::before {
            width: 6px; height: 6px;
            top: 10%; right: -8px;
            animation-duration: 2.1s;
            animation-delay: 0.9s;
        }
        /* Dot 8 (Side) */
        .input-group:nth-child(4)::after {
            width: 10px; height: 10px;
            bottom: 10%; left: -12px;
            animation-duration: 2.9s;
            animation-delay: 1.6s;
        }

        /* Thematic Title */
        h2 {
            font-family: var(--font-title);
            text-align: center;
            margin-top: 0;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--primary-glow), 0 0 15px var(--accent-glow);
            font-size: 2rem;
            line-height: 1.2;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-label);
            font-size: 0.875rem;
            margin-bottom: 2.5rem;
            letter-spacing: 0.5px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            position: relative; /* relative for dots positioning */
        }

        .input-group {
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
            position: relative; /* relative for dots positioning */
        }

        .input-group:hover { transform: translateY(-3px); }

        .input-group.full-width { grid-column: span 2; }

        label {
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-label);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        label i {
            color: #ff9800; 
            text-shadow: 0 0 5px var(--primary-glow);
        }

        input {
            width: 100%;
            padding: 1rem 1.25rem;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-size: 1rem;
            font-family: var(--font-main);
            box-sizing: border-box;
            background-color: rgba(0, 0, 0, 0.3);
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        input:hover {
            background-color: rgba(255, 100, 0, 0.1);
            border-bottom-color: var(--primary-glow);
        }

        input:focus {
            outline: none;
            background-color: rgba(255, 100, 0, 0.15);
            border-bottom-color: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-glow);
            color: #fff;
        }

        .hex-input {
            font-family: monospace;
            font-weight: 600;
            color: #fff;
            letter-spacing: 1px;
            background-color: rgba(231, 76, 60, 0.15); 
        }

        .hex-input:focus {
            border-bottom-color: #fff;
            box-shadow: 0 0 20px #fff, 0 0 35px var(--accent-glow);
        }
        
        hr {
            border: none;
            border-top: 2px solid rgba(255, 100, 0, 0.2);
            margin: 2rem 0;
            grid-column: span 2;
            opacity: 0.6;
            position: relative;
        }

        hr::after {
            content: "🔥"; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: transparent;
            padding: 0 10px;
            font-size: 1.5rem;
            text-shadow: 0 0 10px var(--primary-glow);
        }
        
        @media (max-width: 480px) {
            .container { padding: 2rem 1.5rem; }
            .grid-layout { grid-template-columns: 1fr; gap: 1.25rem; }
            .input-group.full-width { grid-column: span 1; }
            hr { grid-column: span 1; margin: 1.5rem 0; }
            h2 { font-size: 1.5rem; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <h2><i class="fas fa-fire"></i> Ace's Flame <br> <i class="fas fa-history"></i> Transmuter</h2>
        <p class="subtitle">Convert numeric bounties through the legendary cipher!</p>

        <div class="grid-layout">
            <div class="input-group">
                <label for="inp-day"><i class="fas fa-calendar-day"></i> Days</label>
                <input type="number" id="inp-day" placeholder="0">
            </div>

            <div class="input-group">
                <label for="inp-hour"><i class="fas fa-clock"></i> Hours</label>
                <input type="number" id="inp-hour" placeholder="0">
            </div>

            <div class="input-group">
                <label for="inp-minute"><i class="fas fa-stopwatch"></i> Minutes</label>
                <input type="number" id="inp-minute" placeholder="0">
            </div>

            <div class="input-group">
                <label for="inp-second"><i class="fas fa-hourglass-half"></i> Seconds</label>
                <input type="number" id="inp-second" placeholder="0">
            </div>

            <div class="input-group full-width">
                <label for="inp-ms"><i class="fas fa-bolt"></i> Milliseconds (Bounty in Bellies)</label>
                <input type="number" id="inp-ms" placeholder="0">
            </div>

            <hr>

            <div class="input-group full-width">
                <label for="inp-hex"><i class="fas fa-scroll"></i> Ancient Cipher (Hex from Ms)</label>
                <input type="text" id="inp-hex" class="hex-input" placeholder="e.g. 36EE80">
            </div>
        </div>
    </div>

    <script>
        const els = {
            day: document.getElementById('inp-day'),
            hour: document.getElementById('inp-hour'),
            minute: document.getElementById('inp-minute'),
            second: document.getElementById('inp-second'),
            ms: document.getElementById('inp-ms'),
            hex: document.getElementById('inp-hex')
        };

        const multipliers = {
            day: 86400000,
            hour: 3600000,
            minute: 60000,
            second: 1000,
            ms: 1
        };

        function updateFromBase(baseMs, sourceId) {
            if (sourceId !== 'day') els.day.value = formatNumber(baseMs / multipliers.day);
            if (sourceId !== 'hour') els.hour.value = formatNumber(baseMs / multipliers.hour);
            if (sourceId !== 'minute') els.minute.value = formatNumber(baseMs / multipliers.minute);
            if (sourceId !== 'second') els.second.value = formatNumber(baseMs / multipliers.second);
            if (sourceId !== 'ms') els.ms.value = formatNumber(baseMs);
            
            if (sourceId !== 'hex') {
                if (baseMs >= 0) {
                    els.hex.value = Math.floor(baseMs).toString(16).toUpperCase();
                } else {
                    els.hex.value = "";
                }
            }
        }

        function formatNumber(num) {
            return Number.isInteger(num) ? num : parseFloat(num.toFixed(6));
        }

        function handleInput(e) {
            const id = e.target.id.replace('inp-', '');
            let val = e.target.value;
            
            if (val === '') {
                Object.values(els).forEach(el => el.value = '');
                return;
            }

            let baseMs = 0;

            if (id === 'hex') {
                baseMs = parseInt(val, 16);
                if (isNaN(baseMs)) return; 
            } else {
                baseMs = parseFloat(val) * multipliers[id];
            }
            
            updateFromBase(baseMs, id);
        }

        Object.values(els).forEach(el => {
            el.addEventListener('input', handleInput);
        });
    </script>

</body>
</html>
