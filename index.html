<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Time & Hex Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-focus: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-label: #64748b;
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            width: 100%;
            max-width: 550px;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 1.5rem;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-label);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-label);
        }

        input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            background-color: #fdfdfd;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            background-color: #fff;
        }

        .hex-input {
            font-family: monospace;
            font-weight: 600;
            color: var(--primary-focus);
            letter-spacing: 1px;
        }
        
        hr {
            border: none;
            border-top: 1px dashed var(--border-color);
            margin: 2rem 0;
            grid-column: span 2;
        }
        
        @media (max-width: 480px) {
            .grid-layout {
                grid-template-columns: 1fr;
            }
            .input-group.full-width {
                grid-column: span 1;
            }
            hr {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Smart Time Converter</h2>
        <p class="subtitle">Type in any field to auto-calculate the rest</p>

        <div class="grid-layout">
            <div class="input-group">
                <label for="inp-day">Days</label>
                <input type="number" id="inp-day" placeholder="0">
            </div>

            <div class="input-group">
                <label for="inp-hour">Hours</label>
                <input type="number" id="inp-hour" placeholder="0">
            </div>

            <div class="input-group">
                <label for="inp-minute">Minutes</label>
                <input type="number" id="inp-minute" placeholder="0">
            </div>

            <div class="input-group">
                <label for="inp-second">Seconds</label>
                <input type="number" id="inp-second" placeholder="0">
            </div>

            <div class="input-group full-width">
                <label for="inp-ms">Milliseconds</label>
                <input type="number" id="inp-ms" placeholder="0">
            </div>

            <hr>

            <div class="input-group full-width">
                <label for="inp-hex">Hexadecimal (from Milliseconds)</label>
                <input type="text" id="inp-hex" class="hex-input" placeholder="e.g. 36EE80">
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const els = {
            day: document.getElementById('inp-day'),
            hour: document.getElementById('inp-hour'),
            minute: document.getElementById('inp-minute'),
            second: document.getElementById('inp-second'),
            ms: document.getElementById('inp-ms'),
            hex: document.getElementById('inp-hex')
        };

        // Millisecond multipliers for each unit
        const multipliers = {
            day: 86400000,
            hour: 3600000,
            minute: 60000,
            second: 1000,
            ms: 1
        };

        // Function to update all fields based on a base Millisecond value
        function updateFromBase(baseMs, sourceId) {
            if (sourceId !== 'day') els.day.value = formatNumber(baseMs / multipliers.day);
            if (sourceId !== 'hour') els.hour.value = formatNumber(baseMs / multipliers.hour);
            if (sourceId !== 'minute') els.minute.value = formatNumber(baseMs / multipliers.minute);
            if (sourceId !== 'second') els.second.value = formatNumber(baseMs / multipliers.second);
            if (sourceId !== 'ms') els.ms.value = formatNumber(baseMs);
            
            // Hex update (Only calculate for Hex if baseMs is a valid number)
            if (sourceId !== 'hex') {
                if (baseMs >= 0) {
                    els.hex.value = Math.floor(baseMs).toString(16).toUpperCase();
                } else {
                    els.hex.value = "";
                }
            }
        }

        // Helper function to remove trailing zeros for clean UI (e.g. 1.000 -> 1)
        function formatNumber(num) {
            return Number.isInteger(num) ? num : parseFloat(num.toFixed(6));
        }

        // Event handler for typing in inputs
        function handleInput(e) {
            const id = e.target.id.replace('inp-', '');
            let val = e.target.value;
            
            // Clear all fields if the input is empty
            if (val === '') {
                Object.values(els).forEach(el => el.value = '');
                return;
            }

            let baseMs = 0;

            if (id === 'hex') {
                // If user types in Hex, convert hex to Base Ms
                baseMs = parseInt(val, 16);
                if (isNaN(baseMs)) return; // Stop if invalid hex character
            } else {
                // If user types in time units, calculate Base Ms
                baseMs = parseFloat(val) * multipliers[id];
            }
            
            // Update the rest of the UI
            updateFromBase(baseMs, id);
        }

        // Attach event listeners to all inputs
        Object.values(els).forEach(el => {
            el.addEventListener('input', handleInput);
        });
    </script>

</body>
    </html>
